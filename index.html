<title>Leg Up — No money. Just your picks.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --bg2: #12121a;
    --bg3: #1a1a26;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0f0f5;
    --text2: #8888aa;
    --text3: #555570;
    --green: #22c55e;
    --green-bg: rgba(34,197,94,0.12);
    --red: #ef4444;
    --red-bg: rgba(239,68,68,0.12);
    --amber: #f59e0b;
    --amber-bg: rgba(245,158,11,0.1);
    --accent: #6366f1;
    --accent-bg: rgba(99,102,241,0.15);
    --radius: 10px;
    --radius-lg: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; min-height: 100vh; }

  /* TOPBAR */
  .topbar { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand-icon { width: 32px; height: 32px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
  .brand-icon svg { width: 18px; height: 18px; }
  .brand-name { font-size: 18px; font-weight: 600; letter-spacing: -0.5px; }
  .brand-tag { font-size: 11px; color: var(--text2); }
  .top-right { display: flex; align-items: center; gap: 10px; }
  .live-badge { display: flex; align-items: center; gap: 6px; background: var(--green-bg); border: 1px solid rgba(34,197,94,0.25); border-radius: 20px; padding: 4px 12px; font-size: 11px; color: var(--green); }
  .live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  .slip-toggle { background: var(--bg3); border: 1px solid var(--border2); border-radius: 20px; padding: 6px 14px; font-size: 12px; color: var(--text); cursor: pointer; font-family: inherit; transition: all .15s; }
  .slip-toggle:hover { border-color: var(--accent); color: var(--accent); }
  .slip-toggle.has-picks { background: var(--accent-bg); border-color: var(--accent); color: var(--accent); }

  /* GAME TABS */
  .game-bar { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 0 20px; display: flex; gap: 0; overflow-x: auto; }
  .game-tab { padding: 12px 16px; cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; transition: all .15s; color: var(--text2); font-size: 13px; }
  .game-tab:hover { color: var(--text); }
  .game-tab.active { color: var(--text); border-bottom-color: var(--accent); }
  .gt-teams { font-weight: 500; }
  .gt-meta { font-size: 10px; color: var(--text3); margin-top: 2px; }
  .game-tab.active .gt-meta { color: var(--text2); }

  /* LAYOUT */
  .layout { display: grid; grid-template-columns: 1fr 320px; gap: 0; height: calc(100vh - 97px); }
  .left-col { overflow-y: auto; padding: 16px 20px; }
  .right-col { border-left: 1px solid var(--border); overflow-y: auto; background: var(--bg2); }

  /* CAT TABS */
  .cat-bar { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
  .cat-btn { padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border); background: transparent; font-size: 11px; color: var(--text2); cursor: pointer; font-family: inherit; transition: all .15s; white-space: nowrap; }
  .cat-btn:hover { border-color: var(--border2); color: var(--text); }
  .cat-btn.active { background: var(--accent-bg); border-color: var(--accent); color: var(--accent); }

  /* GAME LINE CARD */
  .gl-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 10px; }
  .gl-header { padding: 10px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .gl-title { font-size: 12px; font-weight: 500; color: var(--text); }
  .gl-source { font-size: 10px; color: var(--text3); }
  .gl-row { display: grid; grid-template-columns: 90px 1fr 1fr; border-bottom: 1px solid var(--border); }
  .gl-row:last-child { border-bottom: none; }
  .gl-label { padding: 10px 12px; font-size: 11px; color: var(--text2); display: flex; align-items: center; border-right: 1px solid var(--border); }
  .bet-btn { padding: 10px 8px; text-align: center; cursor: pointer; border: none; background: transparent; font-family: inherit; transition: all .15s; border-right: 1px solid var(--border); }
  .bet-btn:last-child { border-right: none; }
  .bet-btn:hover { background: var(--bg3); }
  .bet-btn.sel { background: var(--accent-bg); }
  .bb-team { font-size: 10px; color: var(--text2); margin-bottom: 3px; }
  .bet-btn.sel .bb-team { color: var(--accent); }
  .bb-main { font-size: 14px; font-weight: 500; color: var(--text); font-family: 'DM Mono', monospace; }
  .bet-btn.sel .bb-main { color: var(--accent); }
  .bb-odds { font-size: 11px; color: var(--text2); margin-top: 2px; font-family: 'DM Mono', monospace; }
  .bet-btn.sel .bb-odds { color: var(--accent); }

  /* PLAYER CARD */
  .player-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 8px; }
  .player-hdr { padding: 9px 12px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; background: var(--bg3); }
  .p-av { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 600; flex-shrink: 0; font-family: 'DM Mono', monospace; }
  .p-name { font-size: 13px; font-weight: 500; color: var(--text); }
  .p-team { font-size: 10px; color: var(--text2); }
  .p-badge { font-size: 9px; padding: 1px 6px; border-radius: 4px; font-weight: 500; margin-left: 4px; }
  .badge-hot { background: rgba(245,158,11,.15); color: var(--amber); border: 1px solid rgba(245,158,11,.25); }
  .badge-inj { background: var(--red-bg); color: var(--red); border: 1px solid rgba(239,68,68,.25); }

  .prop-row { display: flex; align-items: center; padding: 9px 12px; border-bottom: 1px solid var(--border); gap: 8px; }
  .prop-row:last-child { border-bottom: none; }
  .pr-cat { font-size: 12px; color: var(--text2); flex: 1; }
  .pr-line { font-size: 12px; font-weight: 500; color: var(--text); width: 40px; text-align: center; flex-shrink: 0; font-family: 'DM Mono', monospace; }
  .pr-btns { display: flex; gap: 4px; }
  .ou-btn { padding: 5px 10px; border-radius: 6px; border: 1px solid var(--border); font-size: 11px; cursor: pointer; background: var(--bg3); color: var(--text2); min-width: 56px; text-align: center; transition: all .15s; font-family: inherit; }
  .ou-btn:hover { border-color: var(--border2); color: var(--text); }
  .ou-btn .ou-dir { font-size: 9px; display: block; opacity: .7; }
  .ou-btn .ou-val { font-size: 12px; font-weight: 500; display: block; font-family: 'DM Mono', monospace; }
  .ou-btn.sel-o { background: var(--green-bg); border-color: rgba(34,197,94,.4); color: var(--green); }
  .ou-btn.sel-u { background: var(--red-bg); border-color: rgba(239,68,68,.4); color: var(--red); }

  /* SLIP */
  .slip-header { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .slip-title { font-size: 14px; font-weight: 600; }
  .slip-count { font-size: 11px; color: var(--text2); }
  .slip-empty { padding: 40px 16px; text-align: center; }
  .se-icon { width: 40px; height: 40px; background: var(--bg3); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 10px; }
  .se-txt { font-size: 12px; color: var(--text2); line-height: 1.6; }

  .slip-item { padding: 10px 14px; border-bottom: 1px solid var(--border); position: relative; }
  .si-pick { font-size: 12px; font-weight: 500; color: var(--text); padding-right: 20px; line-height: 1.4; }
  .si-game { font-size: 10px; color: var(--text3); margin-top: 2px; }
  .si-bottom { display: flex; align-items: center; justify-content: space-between; margin-top: 5px; }
  .si-odds { font-size: 12px; font-weight: 500; font-family: 'DM Mono', monospace; }
  .si-locked { font-size: 10px; color: var(--text3); }
  .si-move { font-size: 9px; padding: 1px 5px; border-radius: 4px; font-weight: 500; }
  .si-remove { position: absolute; top: 10px; right: 12px; border: none; background: transparent; color: var(--text3); cursor: pointer; font-size: 16px; line-height: 1; transition: color .1s; }
  .si-remove:hover { color: var(--red); }

  .slip-stake { padding: 12px 14px; border-bottom: 1px solid var(--border); }
  .stake-label { font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
  .stake-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .stake-prefix { font-size: 14px; color: var(--text2); }
  .stake-input { flex: 1; background: var(--bg3); border: 1px solid var(--border2); border-radius: 8px; padding: 7px 10px; font-size: 15px; font-weight: 500; color: var(--text); font-family: 'DM Mono', monospace; }
  .stake-input:focus { outline: none; border-color: var(--accent); }
  .presets { display: flex; gap: 4px; }

  .preset:hover, .preset.active { background: var(--accent-bg); border-color: var(--accent); color: var(--accent); }

  .parlay-box { margin: 12px 14px; background: var(--bg3); border-radius: var(--radius); padding: 10px 12px; border: 1px solid var(--border); }
  .pb-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
  .pb-row:last-child { margin-bottom: 0; border-top: 1px solid var(--border); padding-top: 5px; margin-top: 2px; }
  .pb-lbl { font-size: 11px; color: var(--text2); }
  .pb-val { font-size: 12px; font-weight: 500; font-family: 'DM Mono', monospace; }

  .slip-actions { padding: 12px 14px; display: flex; flex-direction: column; gap: 6px; }
  .lock-btn { width: 100%; padding: 11px; background: var(--accent); color: white; border: none; border-radius: var(--radius); font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; transition: opacity .15s; letter-spacing: .01em; }

  .ll-meta { font-size: 10px; color: var(--text3); margin-top: 1px; display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }

  .move-bad { background: rgba(239,68,68,.12); color: var(--red); }

  .rg-col { padding: 12px; text-align: center; }
  .rg-div { background: var(--border); }
  .rg-lbl { font-size: 9px; text-transform: uppercase; letter-spacing: .06em; color: var(--text2); margin-bottom: 3px; }
  .rg-val { font-size: 18px; font-weight: 600; font-family: 'DM Mono', monospace; }
  .rg-sub { font-size: 10px; color: var(--text2); margin-top: 2px; }
  .delta-row { padding: 10px 14px; text-align: center; border-top: 1px solid var(--border); }

  .loading-screen { padding: 60px 20px; text-align: center; }
  .spinner { width: 28px; height: 28px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-txt { font-size: 13px; color: var(--text2); }
  .loading-sub { font-size: 11px; color: var(--text3); margin-top: 4px; }

  .source-footer { font-size: 10px; color: var(--text3); text-align: center; padding: 12px 20px; border-top: 1px solid var(--border); margin-top: 4px; }

  /* TOAST */
  #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--bg3); border: 1px solid var(--border2); color: var(--text); padding: 8px 20px; border-radius: 20px; font-size: 12px; display: none; z-index: 999; white-space: nowrap; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 2px; }

  /* MOBILE */
  @media (max-width: 680px) {
    .layout { grid-template-columns: 1fr; height: auto; }
    .right-col { border-left: none; border-top: 1px solid var(--border); }
    .left-col { padding: 12px; }
  }
</style>
</head>

const CATS = ['Game Lines','Points','Rebounds','Assists','3-Pointers Made','Pts+Reb+Ast','Pts+Reb','Pts+Ast','Blocks','Steals','Specials'];

function fmt(o) { return (o > 0 ? '+' : '') + o; }
function fmtMoney(n) { return (n >= 0 ? '+' : '-') + '$' + Math.abs(n).toFixed(2); }
function amToDec(o) { return o > 0 ? (o / 100) + 1 : (100 / Math.abs(o)) + 1; }

function calcParlay() {
  if (!slip.length) return { payout: 0, profit: 0 };
  const dec = slip.reduce((a, s) => a * amToDec(s.lockedOdds), 1);
  return { payout: parseFloat((stake * dec).toFixed(2)), profit: parseFloat((stake * dec - stake).toFixed(2)) };
}

function pickKey(gIdx, type, side) { return `g${gIdx}_${type}_${side}`; }
function propKey(gIdx, player, cat, side) { return `g${gIdx}_${player.replace(/\s+/g,'_')}_${cat.replace(/\+/g,'p')}_${side}`; }
function isInSlip(key) { return slip.some(s => s.key === key); }

function addPick(key, pick, odds, meta) {
  const base = key.split('_').slice(0, -1).join('_');
  slip = slip.filter(s => !s.key.startsWith(base + '_') && !s.key.startsWith(base.replace(/_over$|_under$/,'')));
  if (!isInSlip(key)) {
    slip.push({ key, pick, lockedOdds: odds, currentOdds: odds, meta, lockedAt: new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}), result: null });
    showToast('Added to slip');
  }
  updateSlipToggle();
  renderAll();
}

function removePick(key) {
  slip = slip.filter(s => s.key !== key);
  updateSlipToggle();
  renderAll();
}

function setResult(key, res) {
  const s = slip.find(s => s.key === key);
  if (s) { s.result = res; renderAll(); }
}

function lockSlip() {
  if (!slip.length) { showToast('Add picks first'); return; }
  const { payout, profit } = calcParlay();
  const perLeg = parseFloat((stake / slip.length).toFixed(2));
  lockedSlips.unshift({
    legs: slip.map(s => ({ ...s, perLeg, straightPayout: parseFloat((perLeg * amToDec(s.lockedOdds)).toFixed(2)) })),
    stake, parlayPayout: payout, parlayProfit: profit,
    lockedAt: new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})
  });
  slip = [];
  showToast(`${lockedSlips[0].legs.length}-leg slip locked on your record`);
  updateSlipToggle();
  renderAll();
}

function setLockedResult(slipIdx, legIdx, res) {
  lockedSlips[slipIdx].legs[legIdx].result = res;
  renderAll();
}

function updateSlipToggle() {
  const btn = document.getElementById('slipToggle');
  btn.textContent = `Slip (${slip.length})`;
  btn.className = 'slip-toggle' + (slip.length ? ' has-picks' : '');
}

function scrollToSlip() {
  document.getElementById('rightCol').scrollIntoView({ behavior: 'smooth' });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 2200);
}

function buildFallback() {
  return [
    { id:'det_orl', home_team:'Orlando Magic', away_team:'Detroit Pistons', commence_time: new Date().toISOString(), bookmakers:[{key:'draftkings',title:'DraftKings',markets:[{key:'h2h',outcomes:[{name:'Detroit Pistons',price:-125},{name:'Orlando Magic',price:+105}]},{key:'spreads',outcomes:[{name:'Detroit Pistons',price:-108,point:-1.5},{name:'Orlando Magic',price:-112,point:+1.5}]},{key:'totals',outcomes:[{name:'Over',price:-110,point:211.5},{name:'Under',price:-110,point:211.5}]}]}] },
    { id:'okc_phx', home_team:'Phoenix Suns', away_team:'Oklahoma City Thunder', commence_time: new Date().toISOString(), bookmakers:[{key:'draftkings',title:'DraftKings',markets:[{key:'h2h',outcomes:[{name:'Oklahoma City Thunder',price:-400},{name:'Phoenix Suns',price:+305}]},{key:'spreads',outcomes:[{name:'Oklahoma City Thunder',price:-108,point:-8.5},{name:'Phoenix Suns',price:-112,point:+8.5}]},{key:'totals',outcomes:[{name:'Over',price:-110,point:216.5},{name:'Under',price:-110,point:216.5}]}]}] },
    { id:'min_den', home_team:'Denver Nuggets', away_team:'Minnesota Timberwolves', commence_time: new Date().toISOString(), bookmakers:[{key:'draftkings',title:'DraftKings',markets:[{key:'h2h',outcomes:[{name:'Denver Nuggets',price:-255},{name:'Minnesota Timberwolves',price:+210}]},{key:'spreads',outcomes:[{name:'Denver Nuggets',price:-112,point:-6.5},{name:'Minnesota Timberwolves',price:-108,point:+6.5}]},{key:'totals',outcomes:[{name:'Over',price:-110,point:213.5},{name:'Under',price:-110,point:213.5}]}]}] }
  ];
}

async function loadOdds() {
  try {
    const res = await fetch(`${BASE}/sports/basketball_nba/odds/?apiKey=${API_KEY}&regions=us&markets=h2h,spreads,totals&oddsFormat=american`);
    if (!res.ok) throw new Error('API error');
    const data = await res.json();
    const tonight = ['Detroit Pistons','Orlando Magic','Oklahoma City Thunder','Phoenix Suns','Minnesota Timberwolves','Denver Nuggets'];
    const filtered = data.filter(g => tonight.includes(g.home_team) || tonight.includes(g.away_team));
    allGames = filtered.length ? filtered.slice(0, 3) : buildFallback();
    loadedAt = new Date();
    document.getElementById('liveLabel').textContent = `Live · ${loadedAt.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}`;
  } catch(e) {
    allGames = buildFallback();
    loadedAt = new Date();
    document.getElementById('liveLabel').textContent = 'Lines loaded';
  }
  renderAll();
}

function getMarkets(g) {
  const bk = g.bookmakers && g.bookmakers[0];
  if (!bk) return {};
  const get = key => bk.markets.find(m => m.key === key);
  return { h2h: get('h2h'), spreads: get('spreads'), totals: get('totals'), source: bk.title };
}

function renderAll() {
  renderGameBar();
  renderLeft();
  renderRight();
  renderLocked();
}

function renderGameBar() {
  document.getElementById('gameBar').innerHTML = allGames.map((g, i) => {
    const aw = ABBR[g.away_team] || g.away_team.split(' ').pop();
    const hw = ABBR[g.home_team] || g.home_team.split(' ').pop();
    const t = new Date(g.commence_time).toLocaleTimeString([], {hour:'numeric',minute:'2-digit'});
    const series = SERIES[g.home_team] || '';
    return `<div class="game-tab${selGame === i ? ' active' : ''}" onclick="selGame=${i};renderAll()">
      <div class="gt-teams">${aw} @ ${hw}</div>
      <div class="gt-meta">${t} ET · ${series}</div>
    </div>`;
  }).join('');
}

function renderLeft() {
  const g = allGames[selGame];
  const { h2h, spreads, totals, source } = getMarkets(g);
  const aw = g.away_team, hw = g.home_team;
  const awAb = ABBR[aw] || aw.split(' ').pop();
  const hwAb = ABBR[hw] || hw.split(' ').pop();

  let html = `<div class="cat-bar">${CATS.map(c => `<button class="cat-btn${selCat===c?' active':''}" onclick="selCat='${c}';renderAll()">${c}</button>`).join('')}</div>`;

  if (selCat === 'Game Lines') {
    html += `<div class="gl-card">
      <div class="gl-header"><span class="gl-title">${aw} @ ${hw}</span><span class="gl-source">${source || 'DraftKings'} · Live</span></div>`;

    if (spreads) {
      const sAw = spreads.outcomes.find(o => o.name === aw);
      const sHw = spreads.outcomes.find(o => o.name === hw);
      const k1 = pickKey(selGame,'spread','away'), k2 = pickKey(selGame,'spread','home');
      html += `<div class="gl-row"><div class="gl-label">Spread</div>
        <div class="bet-btn${isInSlip(k1)?' sel':''}" onclick="addPick('${k1}','${awAb} ${sAw?.point>0?'+':''}${sAw?.point}',${sAw?.price},'${awAb} @ ${hwAb}')">
          <div class="bb-team">${awAb}</div><div class="bb-main">${sAw?.point>0?'+':''}${sAw?.point}</div><div class="bb-odds">${fmt(sAw?.price)}</div>
        </div>
        <div class="bet-btn${isInSlip(k2)?' sel':''}" onclick="addPick('${k2}','${hwAb} ${sHw?.point>0?'+':''}${sHw?.point}',${sHw?.price},'${awAb} @ ${hwAb}')">
          <div class="bb-team">${hwAb}</div><div class="bb-main">${sHw?.point>0?'+':''}${sHw?.point}</div><div class="bb-odds">${fmt(sHw?.price)}</div>
        </div></div>`;
    }

    if (h2h) {
      const mAw = h2h.outcomes.find(o => o.name === aw);
      const mHw = h2h.outcomes.find(o => o.name === hw);
      const k1 = pickKey(selGame,'ml','away'), k2 = pickKey(selGame,'ml','home');
      html += `<div class="gl-row"><div class="gl-label">Moneyline</div>
        <div class="bet-btn${isInSlip(k1)?' sel':''}" onclick="addPick('${k1}','${awAb} ML',${mAw?.price},'${awAb} @ ${hwAb}')">
          <div class="bb-team">${awAb}</div><div class="bb-main">${fmt(mAw?.price)}</div><div class="bb-odds">&nbsp;</div>
        </div>
        <div class="bet-btn${isInSlip(k2)?' sel':''}" onclick="addPick('${k2}','${hwAb} ML',${mHw?.price},'${awAb} @ ${hwAb}')">
          <div class="bb-team">${hwAb}</div><div class="bb-main">${fmt(mHw?.price)}</div><div class="bb-odds">&nbsp;</div>
        </div></div>`;
    }

    if (totals) {
      const ov = totals.outcomes.find(o => o.name === 'Over');
      const un = totals.outcomes.find(o => o.name === 'Under');
      const k1 = pickKey(selGame,'total','over'), k2 = pickKey(selGame,'total','under');
      html += `<div class="gl-row"><div class="gl-label">Total</div>
        <div class="bet-btn${isInSlip(k1)?' sel':''}" onclick="addPick('${k1}','Over ${ov?.point}',${ov?.price},'${awAb} @ ${hwAb} Total')">
          <div class="bb-team">Over</div><div class="bb-main">${ov?.point}</div><div class="bb-odds">${fmt(ov?.price)}</div>
        </div>
        <div class="bet-btn${isInSlip(k2)?' sel':''}" onclick="addPick('${k2}','Under ${un?.point}',${un?.price},'${awAb} @ ${hwAb} Total')">
          <div class="bb-team">Under</div><div class="bb-main">${un?.point}</div><div class="bb-odds">${fmt(un?.price)}</div>
        </div></div>`;
    }

    html += `</div>`;
    document.getElementById('leftCol').innerHTML = html + `<div class="source-footer">Lines from ${source||'DraftKings'} · Loaded ${loadedAt?.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})} · No money wagered on Leg Up</div>`;
    return;
  }

  const propCats = selCat === 'Specials' ? ['Triple Double','Double Double'] : [selCat];
  const teams = [g.away_team, g.home_team];
  let hasAny = false;

  teams.forEach(team => {
    (PROP_PLAYERS[team] || []).forEach(player => {
      const pdata = PROP_LINES[player];
      if (!pdata) return;
      const relevant = propCats.filter(c => pdata[c]);
      if (!relevant.length) return;
      hasAny = true;

      const ab = ABBR[team] || team.split(' ').pop();
      const color = COLORS[ab] || '#6366f1';
      const initials = player.split(' ').map(w => w[0]).join('').slice(0,3);
      const isHot = HOT.includes(player);
      const isInj = INJ.includes(player);

      html += `<div class="player-card">
        <div class="player-hdr">
          <div class="p-av" style="background:${color}22;color:${color}">${initials}</div>
          <div>
            <div class="p-name">${player}${isHot?`<span class="p-badge badge-hot">Hot</span>`:''}${isInj?`<span class="p-badge badge-inj">Questionable</span>`:''}</div>
            <div class="p-team">${team}</div>
          </div>
        </div>`;

      relevant.forEach(cat => {
        const prop = pdata[cat];
        const ok = propKey(selGame, player, cat, 'over');
        const uk = propKey(selGame, player, cat, 'under');
        const selO = isInSlip(ok), selU = isInSlip(uk);
        const lineDisplay = prop.special ? 'Yes/No' : prop.line;
        const safePlayer = player.replace(/'/g, "\\'");
        const safeCat = cat.replace(/'/g, "\\'");

        html += `<div class="prop-row">
          <div class="pr-cat">${cat}</div>
          <div class="pr-line">${lineDisplay}</div>
          <div class="pr-btns">
            <button class="ou-btn${selO?' sel-o':''}" onclick="addPick('${ok}','${safePlayer} ${prop.special?cat+' Yes':'Over '+prop.line+' '+safeCat}',${prop.over},'${ab}')">
              <span class="ou-dir">${prop.special?'Yes':'Over'}</span>
              <span class="ou-val">${fmt(prop.over)}</span>
            </button>
            <button class="ou-btn${selU?' sel-u':''}" onclick="addPick('${uk}','${safePlayer} ${prop.special?cat+' No':'Under '+prop.line+' '+safeCat}',${prop.under},'${ab}')">
              <span class="ou-dir">${prop.special?'No':'Under'}</span>
              <span class="ou-val">${fmt(prop.under)}</span>
            </button>
          </div>
        </div>`;
      });

      html += `</div>`;
    });
  });

  if (!hasAny) html += `<div style="padding:40px;text-align:center;color:var(--text2);font-size:13px">No ${selCat} props available for this matchup</div>`;
  html += `<div class="source-footer">Player props · Leg Up · No money wagered</div>`;
  document.getElementById('leftCol').innerHTML = html;
}

function renderRight() {
  const { payout, profit } = calcParlay();
  let html = `<div class="slip-header"><div class="slip-title">Bet Slip</div><div class="slip-count">${slip.length} pick${slip.length!==1?'s':''}</div></div>`;

  if (!slip.length) {
    html += `<div class="slip-empty"><div class="se-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><line x1="9" y1="9" x2="15" y2="9"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="15" x2="12" y2="15"/></svg></div><div class="se-txt">Your slip is empty.<br>Tap any line to add a pick.</div></div>`;
  } else {
    slip.forEach(s => {
      const moved = s.currentOdds !== s.lockedOdds;
      const movedUp = s.currentOdds > s.lockedOdds;
      const oddsColor = s.lockedOdds > 0 ? 'var(--green)' : 'var(--text)';
      html += `<div class="slip-item">
        <div class="si-pick">${s.pick}</div>
        <div class="si-game">${s.meta}</div>
        <div class="si-bottom">
          <span class="si-odds" style="color:${oddsColor}">${fmt(s.lockedOdds)}</span>
          <span class="si-locked">Locked ${s.lockedAt}</span>
          ${moved ? `<span class="si-move ${movedUp?'move-bad':'move-good'}">${movedUp?'▲ against you':'▼ your way'}</span>` : ''}
        </div>
        <button class="si-remove" onclick="removePick('${s.key}')">×</button>
      </div>`;
    });

    html += `<div class="slip-stake">
      <div class="stake-label">Stake</div>
      <div class="stake-row"><span class="stake-prefix">$</span><input type="number" class="stake-input" value="${stake}" min="1" onchange="stake=parseFloat(this.value)||50;renderRight()"></div>
      <div class="presets">${[5,10,25,50,100].map(v=>`<button class="preset${stake===v?' active':''}" onclick="stake=${v};renderRight()">${v}</button>`).join('')}</div>
    </div>
    <div class="parlay-box">
      <div class="pb-row"><span class="pb-lbl">Stake</span><span class="pb-val">$${stake.toFixed(2)}</span></div>
      <div class="pb-row"><span class="pb-lbl">${slip.length}-leg parlay</span><span class="pb-val green">$${payout.toFixed(2)}</span></div>
      <div class="pb-row"><span class="pb-lbl">Est. profit</span><span class="pb-val green">+$${profit.toFixed(2)}</span></div>
    </div>
    <div class="slip-actions">
      <button class="lock-btn" onclick="lockSlip()">Lock Picks — No Money</button>
      <button class="straight-btn" onclick="showStraight()">View as straight bets</button>
    </div>`;
  }

  document.getElementById('rightCol').innerHTML = html;
}

function showStraight() {
  if (!slip.length) return;
  const per = (stake / slip.length).toFixed(2);
  showToast(`${slip.length} straight bets · $${per} each · same total stake`);
}

function renderLocked() {
  if (!lockedSlips.length) { document.getElementById('lockedSection').innerHTML = ''; return; }

  let html = `<div class="locked-section"><div class="ls-title">Locked slips</div>`;

  lockedSlips.forEach((ls, idx) => {
    const wins = ls.legs.filter(l => l.result === 'win').length;
    const losses = ls.legs.filter(l => l.result === 'loss').length;
    const pending = ls.legs.filter(l => !l.result).length;
    const allDone = !pending;
    const allWin = allDone && wins === ls.legs.length;
    const parlayResult = allDone ? (allWin ? ls.parlayProfit : -ls.stake) : null;
    const straightTotal = allDone ? ls.legs.reduce((s, l) => s + (l.result==='win' ? l.straightPayout - l.perLeg : -l.perLeg), 0) : null;
    const diff = allDone ? straightTotal - parlayResult : null;

    html += `<div class="locked-card">
      <div class="lc-hdr">
        <span class="lc-name">${ls.legs.length}-leg parlay · $${ls.stake} stake</span>
        <span class="lc-time">Locked ${ls.lockedAt} · ${wins}W ${losses}L ${pending}P</span>
      </div>`;

    ls.legs.forEach((l, li) => {
      const moved = l.currentOdds && l.currentOdds !== l.lockedOdds;
      const movedUp = moved && l.currentOdds > l.lockedOdds;
      const dotColor = !l.result ? 'var(--text3)' : l.result==='win' ? 'var(--green)' : 'var(--red)';

      html += `<div class="lc-leg">
        <div class="ll-dot" style="background:${dotColor}"></div>
        <div class="ll-info">
          <div class="ll-pick">${l.pick}</div>
          <div class="ll-meta">
            <span style="font-family:'DM Mono',monospace">${fmt(l.lockedOdds)}</span> · ${l.lockedAt}
            ${moved ? `<span class="ll-move ${movedUp?'move-bad':'move-good'}">${movedUp?'▲ moved against you':'▼ moved your way'}</span>` : ''}
          </div>
        </div>
        <div class="ll-res">
          <button class="res-btn${l.result==='win'?' win':''}" onclick="setLockedResult(${idx},${li},'win')">Win</button>
          <button class="res-btn${l.result==='loss'?' loss':''}" onclick="setLockedResult(${idx},${li},'loss')">Loss</button>
        </div>
      </div>`;
    });

    if (allDone) {
      const parlayColor = parlayResult >= 0 ? 'var(--green)' : 'var(--red)';
      const straightColor = straightTotal >= 0 ? 'var(--green)' : 'var(--red)';
      html += `<div class="result-grid">
        <div class="rg-col">
          <div class="rg-lbl">Parlay</div>
          <div class="rg-val" style="color:${parlayColor}">${fmtMoney(parlayResult)}</div>
          <div class="rg-sub">All or nothing</div>
        </div>
        <div class="rg-div"></div>
        <div class="rg-col">
          <div class="rg-lbl">Straight bets</div>
          <div class="rg-val" style="color:${straightColor}">${fmtMoney(straightTotal)}</div>
          <div class="rg-sub">Same stake split</div>
        </div>
      </div>
      <div class="delta-row" style="background:${diff>0?'var(--green-bg)':'var(--bg3)'}">
        <div class="dr-lbl">Parlay format cost you</div>
        <div class="dr-val" style="color:${diff>0?'var(--green)':'var(--text)'}">${fmtMoney(diff)}</div>
      </div>`;
    }

    html += `</div>`;
  });

  html += `</div>`;
  document.getElementById('lockedSection').innerHTML = html;
}

loadOdds();
</script>
