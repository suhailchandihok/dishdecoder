<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leg Up — No money. Just your picks.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--ink:#0d0d12;--ink2:#16161f;--ink3:#1e1e2a;--ink4:#26263a;--line:rgba(255,255,255,0.07);--line2:rgba(255,255,255,0.12);--line3:rgba(255,255,255,0.18);--smoke:#6b6b8a;--text:#f2f2f8;--text2:#9090b0;--text3:#55556a;--lime:#b6f542;--lime-dim:rgba(182,245,66,0.1);--lime-line:rgba(182,245,66,0.28);--red:#ff4d4d;--red-dim:rgba(255,77,77,0.1);--red-line:rgba(255,77,77,0.28);--amber:#ffb347;--amber-dim:rgba(255,179,71,0.1);--r:8px;--r2:12px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px}
body{background:var(--ink);color:var(--text);font-family:'IBM Plex Sans',sans-serif;font-weight:400;min-height:100vh;-webkit-font-smoothing:antialiased}

/* TOPBAR */
.topbar{height:54px;background:var(--ink2);border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 18px;gap:0;position:sticky;top:0;z-index:200}
.logo{display:flex;align-items:center;gap:9px;margin-right:24px;flex-shrink:0}
.logo-mark{width:28px;height:28px;background:var(--lime);border-radius:6px;display:flex;align-items:center;justify-content:center}
.logo-mark svg{width:15px;height:15px}
.logo-text{font-family:'Syne',sans-serif;font-weight:800;font-size:16px;letter-spacing:-.3px}
.logo-sub{font-size:9px;color:var(--text3);letter-spacing:.04em;margin-top:1px}
.topbar-games{display:flex;gap:2px;flex:1;overflow-x:auto;scrollbar-width:none}
.topbar-games::-webkit-scrollbar{display:none}
.tg-btn{display:flex;flex-direction:column;align-items:center;padding:5px 14px;border-radius:var(--r);cursor:pointer;border:1px solid transparent;background:transparent;font-family:inherit;transition:all .15s;white-space:nowrap;gap:1px}
.tg-btn:hover{background:var(--ink3)}
.tg-btn.active{background:var(--lime-dim);border-color:var(--lime-line)}
.tg-teams{font-family:'Syne',sans-serif;font-weight:600;font-size:12px;color:var(--text)}
.tg-btn.active .tg-teams{color:var(--lime)}
.tg-info{font-size:9px;color:var(--text3);font-family:'IBM Plex Mono',monospace}
.tg-btn.active .tg-info{color:rgba(182,245,66,.5)}
.topbar-right{display:flex;align-items:center;gap:8px;margin-left:auto;flex-shrink:0;padding-left:14px}
.live-pill{display:flex;align-items:center;gap:5px;background:var(--lime-dim);border:1px solid var(--lime-line);border-radius:20px;padding:4px 10px;font-size:9px;color:var(--lime);font-family:'IBM Plex Mono',monospace;letter-spacing:.05em}
.live-pip{width:5px;height:5px;border-radius:50%;background:var(--lime);animation:blink 2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.slip-pill{display:flex;align-items:center;gap:6px;background:var(--ink3);border:1px solid var(--line2);border-radius:20px;padding:5px 13px;font-size:11px;color:var(--text2);cursor:pointer;font-family:'IBM Plex Mono',monospace;transition:all .15s}
.slip-pill:hover{border-color:var(--line3);color:var(--text)}
.slip-pill.on{background:var(--lime-dim);border-color:var(--lime-line);color:var(--lime)}
.slip-badge{background:var(--lime);color:var(--ink);border-radius:10px;padding:1px 5px;font-size:9px;font-weight:700;display:none;min-width:16px;text-align:center}
.slip-pill.on .slip-badge{display:block}

/* CAT BAR */
.cat-bar{background:var(--ink2);border-bottom:1px solid var(--line);padding:0 18px;display:flex;gap:0;overflow-x:auto;scrollbar-width:none}
.cat-bar::-webkit-scrollbar{display:none}
.cat-tab{padding:10px 13px;font-size:11px;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;font-family:'IBM Plex Sans',sans-serif;font-weight:400;transition:all .15s;background:transparent;border-top:none;border-left:none;border-right:none;font-family:inherit}
.cat-tab:hover{color:var(--text2)}
.cat-tab.active{color:var(--lime);border-bottom-color:var(--lime);font-weight:500}

/* BODY */
.body-wrap{display:grid;grid-template-columns:1fr 320px;min-height:calc(100vh - 90px)}
.main-col{padding:18px;overflow-y:auto}
.slip-col{border-left:1px solid var(--line);background:var(--ink2);display:flex;flex-direction:column;position:sticky;top:90px;max-height:calc(100vh - 90px);overflow-y:auto}

/* SECTION LABEL */
.sec-lbl{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.12em;color:var(--text3);text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.sec-lbl::after{content:'';flex:1;height:1px;background:var(--line)}

/* GAME LINE CARD */
.gl-card{background:var(--ink2);border:1px solid var(--line2);border-radius:var(--r2);overflow:hidden;margin-bottom:16px}
.gl-hdr{padding:12px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line)}
.gl-title{font-family:'Syne',sans-serif;font-weight:700;font-size:14px;letter-spacing:-.2px}
.gl-src{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--text3);background:var(--ink3);padding:2px 7px;border-radius:4px;letter-spacing:.04em}
.mkt-block{border-bottom:1px solid var(--line)}
.mkt-block:last-child{border-bottom:none}
.mkt-lbl{padding:8px 14px 0;font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:.09em;text-transform:uppercase}
.mkt-opts{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:7px 14px 12px}
.mkt-btn{background:var(--ink3);border:1px solid var(--line2);border-radius:var(--r);padding:10px 10px;text-align:center;cursor:pointer;transition:all .16s;font-family:inherit}
.mkt-btn:hover{border-color:var(--line3)}
.mkt-btn.sel{background:var(--lime-dim);border-color:var(--lime-line)}
.mb-lbl{font-size:10px;color:var(--text3);margin-bottom:4px}
.mkt-btn.sel .mb-lbl{color:rgba(182,245,66,.55)}
.mb-main{font-family:'Syne',sans-serif;font-weight:700;font-size:17px;color:var(--text);letter-spacing:-.3px}
.mkt-btn.sel .mb-main{color:var(--lime)}
.mb-odds{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text2);margin-top:3px}
.mkt-btn.sel .mb-odds{color:rgba(182,245,66,.65)}

/* PLAYER PROPS */
.player-group{margin-bottom:8px}
.player-hdr{display:flex;align-items:center;gap:10px;padding:9px 13px;background:var(--ink3);border:1px solid var(--line2);border-radius:var(--r2) var(--r2) 0 0}
.p-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:500;flex-shrink:0}
.p-name{font-family:'Syne',sans-serif;font-weight:600;font-size:13px;display:flex;align-items:center;gap:6px}
.p-team{font-size:9px;color:var(--text3);font-family:'IBM Plex Mono',monospace;margin-top:1px;letter-spacing:.03em}
.badge{font-size:8px;padding:1px 5px;border-radius:3px;font-weight:500;font-family:'IBM Plex Mono',monospace;letter-spacing:.03em}
.badge-hot{background:var(--amber-dim);color:var(--amber);border:1px solid rgba(255,179,71,.22)}
.badge-inj{background:var(--red-dim);color:var(--red);border:1px solid var(--red-line)}
.prop-list{background:var(--ink2);border:1px solid var(--line2);border-top:1px solid var(--line);border-radius:0 0 var(--r2) var(--r2);overflow:hidden}
.prop-row{display:grid;grid-template-columns:1fr 48px 112px;align-items:center;padding:8px 13px;border-bottom:1px solid var(--line);gap:8px;transition:background .1s}
.prop-row:last-child{border-bottom:none}
.prop-row:hover{background:rgba(255,255,255,.02)}
.pr-type{font-size:11px;color:var(--text2)}
.pr-line{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:500;color:var(--text);text-align:center}
.pr-btns{display:grid;grid-template-columns:1fr 1fr;gap:3px}
.ou-btn{padding:6px 0;border-radius:5px;border:1px solid var(--line2);background:var(--ink3);cursor:pointer;text-align:center;transition:all .14s;font-family:inherit}
.ou-btn:hover{border-color:var(--line3)}
.ou-dir{font-size:8px;color:var(--text3);display:block;text-transform:uppercase;letter-spacing:.05em;font-family:'IBM Plex Mono',monospace}
.ou-odds{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:500;color:var(--text);display:block;margin-top:1px}
.ou-btn.sel-o{background:var(--lime-dim);border-color:var(--lime-line)}
.ou-btn.sel-o .ou-dir{color:rgba(182,245,66,.5)}
.ou-btn.sel-o .ou-odds{color:var(--lime)}
.ou-btn.sel-u{background:var(--red-dim);border-color:var(--red-line)}
.ou-btn.sel-u .ou-dir{color:rgba(255,77,77,.5)}
.ou-btn.sel-u .ou-odds{color:var(--red)}

/* SLIP */
.slip-hdr{padding:14px 16px 10px;border-bottom:1px solid var(--line)}
.slip-title-row{display:flex;align-items:baseline;justify-content:space-between}
.slip-title{font-family:'Syne',sans-serif;font-weight:800;font-size:15px;letter-spacing:-.2px}
.slip-legs-ct{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text3)}
.slip-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 18px;text-align:center}
.se-mark{font-family:'Syne',sans-serif;font-size:38px;font-weight:800;color:var(--ink4);margin-bottom:8px;letter-spacing:-3px}
.se-txt{font-size:11px;color:var(--text3);line-height:1.7}
.slip-items{overflow-y:auto}
.slip-item{padding:10px 14px;border-bottom:1px solid var(--line);position:relative;transition:background .1s}
.si-pick{font-weight:500;font-size:12px;color:var(--text);padding-right:18px;line-height:1.4}
.si-game{font-size:9px;color:var(--text3);font-family:'IBM Plex Mono',monospace;margin-top:2px;letter-spacing:.02em}
.si-row{display:flex;align-items:center;gap:7px;margin-top:5px}
.si-odds{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:500}
.si-time{font-size:9px;color:var(--text3);font-family:'IBM Plex Mono',monospace}
.si-move{font-size:8px;padding:1px 5px;border-radius:3px;font-family:'IBM Plex Mono',monospace;font-weight:500}
.move-bad{background:var(--red-dim);color:var(--red)}
.move-good{background:var(--lime-dim);color:var(--lime)}
.si-rm{position:absolute;top:10px;right:13px;background:transparent;border:none;color:var(--text3);cursor:pointer;font-size:15px;line-height:1;transition:color .1s;width:18px;height:18px;display:flex;align-items:center;justify-content:center}
.si-rm:hover{color:var(--red)}
.slip-foot{padding:12px 14px;border-top:1px solid var(--line)}
.foot-lbl{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:7px}
.stake-wrap{display:flex;align-items:center;background:var(--ink3);border:1px solid var(--line2);border-radius:var(--r);overflow:hidden;margin-bottom:7px;transition:border-color .15s}
.stake-wrap:focus-within{border-color:var(--lime-line)}
.stake-sign{padding:0 10px;font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--text3);border-right:1px solid var(--line)}
.stake-in{flex:1;background:transparent;border:none;padding:8px 9px;font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:500;color:var(--text);outline:none}
.presets{display:flex;gap:3px;margin-bottom:10px}
.pre{flex:1;padding:5px 0;border-radius:5px;border:1px solid var(--line);background:transparent;font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--text3);cursor:pointer;transition:all .12s;text-align:center}
.pre:hover{border-color:var(--line2);color:var(--text2)}
.pre.on{background:var(--lime-dim);border-color:var(--lime-line);color:var(--lime)}
.parlay-box{background:var(--ink3);border:1px solid var(--line);border-radius:var(--r);padding:9px 11px;margin-bottom:10px}
.pb-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.pb-row:last-child{margin-bottom:0;border-top:1px solid var(--line);padding-top:5px;margin-top:2px}
.pb-lbl{font-size:10px;color:var(--text3)}
.pb-val{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:500;color:var(--text)}
.pb-val.g{color:var(--lime)}
.lock-btn{width:100%;padding:11px;background:var(--lime);color:var(--ink);border:none;border-radius:var(--r);font-family:'Syne',sans-serif;font-weight:800;font-size:12px;letter-spacing:.04em;cursor:pointer;transition:opacity .14s;margin-bottom:5px}
.lock-btn:hover{opacity:.87}
.lock-btn:disabled{opacity:.28;cursor:not-allowed}
.split-btn{width:100%;padding:8px;background:transparent;border:1px solid var(--line2);border-radius:var(--r);font-size:11px;color:var(--text3);cursor:pointer;font-family:inherit;transition:all .14s}
.split-btn:hover{border-color:var(--line3);color:var(--text2)}

/* LOCKED */
.locked-area{padding:18px}
.locked-hdr{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.locked-hdr::after{content:'';flex:1;height:1px;background:var(--line)}
.locked-card{background:var(--ink2);border:1px solid var(--line2);border-radius:var(--r2);overflow:hidden;margin-bottom:10px}
.lc-hdr{padding:10px 13px;background:var(--ink3);border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
.lc-name{font-family:'Syne',sans-serif;font-weight:600;font-size:12px}
.lc-meta{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--text3)}
.lc-leg{display:flex;align-items:center;gap:9px;padding:8px 13px;border-bottom:1px solid var(--line)}
.lc-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.lc-info{flex:1;min-width:0}
.lc-pick{font-size:12px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lc-sub{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--text3);margin-top:2px;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.lc-move{font-size:8px;padding:1px 4px;border-radius:3px;font-weight:500}
.lc-res{display:flex;gap:3px;flex-shrink:0}
.res-btn{padding:3px 8px;border-radius:4px;border:1px solid var(--line);background:var(--ink3);font-size:9px;color:var(--text3);cursor:pointer;font-family:'IBM Plex Mono',monospace;transition:all .12s;letter-spacing:.03em}
.res-btn:hover{border-color:var(--line2);color:var(--text)}
.res-btn.win{background:var(--lime-dim);border-color:var(--lime-line);color:var(--lime)}
.res-btn.loss{background:var(--red-dim);border-color:var(--red-line);color:var(--red)}
.cmp-grid{display:grid;grid-template-columns:1fr 1px 1fr;border-top:1px solid var(--line)}
.cmp-col{padding:12px;text-align:center}
.cmp-div{background:var(--line)}
.cmp-lbl{font-family:'IBM Plex Mono',monospace;font-size:8px;letter-spacing:.09em;text-transform:uppercase;color:var(--text3);margin-bottom:4px}
.cmp-val{font-family:'Syne',sans-serif;font-weight:800;font-size:19px;letter-spacing:-.4px}
.cmp-sub{font-size:9px;color:var(--text3);margin-top:2px}
.delta{padding:11px 13px;text-align:center;border-top:1px solid var(--line)}
.delta-lbl{font-family:'IBM Plex Mono',monospace;font-size:8px;letter-spacing:.09em;text-transform:uppercase;color:var(--text3);margin-bottom:3px}
.delta-val{font-family:'Syne',sans-serif;font-weight:800;font-size:20px;letter-spacing:-.4px}

/* MISC */
.loading-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;gap:12px}
.spinner{width:22px;height:22px;border:2px solid var(--line2);border-top-color:var(--lime);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{font-size:12px;color:var(--text2)}
.loading-sub{font-size:10px;color:var(--text3);font-family:'IBM Plex Mono',monospace}
.src-footer{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--text3);text-align:center;padding:14px;border-top:1px solid var(--line);margin-top:6px;letter-spacing:.03em}
#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--ink4);border:1px solid var(--line3);color:var(--text);padding:8px 18px;border-radius:20px;font-size:11px;display:none;z-index:999;white-space:nowrap;font-family:'IBM Plex Mono',monospace;letter-spacing:.02em}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--ink4);border-radius:2px}
@media(max-width:720px){.body-wrap{grid-template-columns:1fr}.slip-col{border-left:none;border-top:1px solid var(--line);position:static;max-height:none}}
</style>
</head>
<body>
<div id="toast"></div>

<header class="topbar">
  <div class="logo">
    <div class="logo-mark">
      <svg viewBox="0 0 24 24" fill="none" stroke="#0d0d12" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
    </div>
    <div><div class="logo-text">LEG UP</div><div class="logo-sub">NO MONEY · JUST YOUR PICKS</div></div>
  </div>
  <div class="topbar-games" id="gameBar"></div>
  <div class="topbar-right">
    <div class="live-pill"><div class="live-pip"></div><span id="liveLabel">LOADING</span></div>
    <button id="refreshBtn" onclick="fetchFreshOdds()" style="display:none;align-items:center;background:var(--ink3);border:1px solid var(--line2);border-radius:20px;padding:5px 12px;font-size:9px;color:var(--text2);cursor:pointer;font-family:'IBM Plex Mono',monospace;letter-spacing:.05em;transition:all .15s" onmouseover="this.style.borderColor='var(--lime-line)';this.style.color='var(--lime)'" onmouseout="this.style.borderColor='var(--line2)';this.style.color='var(--text2)'">REFRESH LINES</button>
    <div class="slip-pill" id="slipPill" onclick="focusSlip()">
      <span>SLIP</span><span class="slip-badge" id="slipBadge">0</span>

  </div>
</header>

<nav class="cat-bar" id="catBar"></nav>

<div class="body-wrap">
  <main class="main-col" id="mainCol">
    <div class="loading-wrap"><div class="spinner"></div><div class="loading-txt">Connecting to live sportsbooks...</div><div class="loading-sub">FETCHING REAL LINES · DRAFTKINGS</div></div>

</div>

<script>
const API_KEY='08157c28502f32fa0728d46f3445a0cd';

let games=[],selGame=0,selCat='Game Lines',slip=[],stake=50,locked=[],loadedAt=null;
const ABBR={'Detroit Pistons':'DET','Orlando Magic':'ORL','Oklahoma City Thunder':'OKC','Phoenix Suns':'PHX','Minnesota Timberwolves':'MIN','Denver Nuggets':'DEN','Boston Celtics':'BOS','Philadelphia 76ers':'PHI','New York Knicks':'NYK','Atlanta Hawks':'ATL','Cleveland Cavaliers':'CLE','Toronto Raptors':'TOR','Los Angeles Lakers':'LAL','Houston Rockets':'HOU','San Antonio Spurs':'SAS','Portland Trail Blazers':'POR'};
const COLORS={'DET':'#4a8fd4','ORL':'#3aabff','OKC':'#007ac1','PHX':'#e56020','MIN':'#4a78b0','DEN':'#fec524','BOS':'#2da85a','PHI':'#2a5fbd','NYK':'#006bb6','ATL':'#e03a3e','CLE':'#a01030','TOR':'#ce1141','LAL':'#7a3fbf','HOU':'#ce1141','SAS':'#c4ced4','POR':'#e03a3e'};
const SERIES={'Detroit Pistons':'DET 1–2','Orlando Magic':'DET 1–2','Oklahoma City Thunder':'OKC 3–0','Phoenix Suns':'OKC 3–0','Minnesota Timberwolves':'MIN 3–1','Denver Nuggets':'MIN 3–1'};
const HOT=['Paolo Banchero','Shai Gilgeous-Alexander','Dillon Brooks','Nikola Jokic','Ayo Dosunmu'];
const INJ=['Anthony Edwards'];

const fo=o=>(o>0?'+':'')+o;
const fm=n=>(n>=0?'+':'-')+'$'+Math.abs(n).toFixed(2);
const dec=o=>o>0?o/100+1:100/Math.abs(o)+1;
const toast=msg=>{const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';setTimeout(()=>t.style.display='none',2200)};
const pk=(g,t,s)=>`G${g}_${t}_${s}`;
const ppk=(g,p,c,s)=>`G${g}_${p.replace(/\W+/g,'_')}_${c.replace(/\W+/g,'_')}_${s}`;
const inSlip=k=>slip.some(s=>s.key===k);
const calcP=()=>{if(!slip.length)return{pay:0,prof:0};const d=slip.reduce((a,s)=>a*dec(s.odds),1);return{pay:+(stake*d).toFixed(2),prof:+(stake*d-stake).toFixed(2)}};

function addPick(key,label,odds,game){
  const base=key.split('_').slice(0,-1).join('_');
  slip=slip.filter(s=>!s.key.startsWith(base+'_'));
  if(!inSlip(key)){slip.push({key,label,odds,game,locked:new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}),result:null});toast('Added to slip')}
  syncPill();renderSlip();
}
function removePick(key){slip=slip.filter(s=>s.key!==key);syncPill();renderSlip()}
function syncPill(){const b=document.getElementById('slipBadge'),p=document.getElementById('slipPill');b.textContent=slip.length;if(slip.length){p.classList.add('on');b.style.display='block'}else{p.classList.remove('on');b.style.display='none'}}
function focusSlip(){document.getElementById('slipCol').scrollIntoView({behavior:'smooth'})}
function lockSlip(){if(!slip.length){toast('Add picks first');return}const{pay,prof}=calcP();const pl=+(stake/slip.length).toFixed(2);locked.unshift({legs:slip.map(s=>({...s,pl,sp:+(pl*dec(s.odds)).toFixed(2)})),stake,pay,prof,at:new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})});slip=[];syncPill();toast(`${locked[0].legs.length}-leg slip locked`);renderSlip();renderLocked()}
function setRes(si,li,r){locked[si].legs[li].result=r;renderLocked()}
function showSplit(){const per=(stake/Math.max(slip.length,1)).toFixed(2);toast(`${slip.length} straight bets · $${per} each · $${stake.toFixed(2)} total`)}

const CACHE_KEY='legup_odds';

function getCached(){
  try{const raw=localStorage.getItem(CACHE_KEY);if(!raw)return null;return JSON.parse(raw)}catch{return null}
}
function setCache(data){
  try{localStorage.setItem(CACHE_KEY,JSON.stringify({data,ts:Date.now()}))}catch{}
}

// On page load — always use cache if it exists, never auto-call API
function load(){
  const cached=getCached();
  if(cached){
    const tn=new Set(['Detroit Pistons','Orlando Magic','Oklahoma City Thunder','Phoenix Suns','Minnesota Timberwolves','Denver Nuggets']);
    const f=cached.data.filter(g=>tn.has(g.home_team)||tn.has(g.away_team));
    games=f.length?f.slice(0,3):fallback();
    loadedAt=new Date(cached.ts);
    const age=Math.round((Date.now()-cached.ts)/60000);
    document.getElementById('liveLabel').textContent=`CACHED · ${age}m AGO`;
    document.getElementById('refreshBtn').style.display='flex';
  } else {
    // No cache yet — load fallback data, show refresh button
    games=fallback();
    loadedAt=new Date();
    document.getElementById('liveLabel').textContent='DEMO DATA';
    document.getElementById('refreshBtn').style.display='flex';
  }
  renderAll();
}

// Only hits API when YOU click the refresh button
async function fetchFreshOdds(){
  const btn=document.getElementById('refreshBtn');
  btn.textContent='FETCHING...';
  btn.style.opacity='.5';
  btn.style.pointerEvents='none';
  try{
    const r=await fetch(`${BASE}/sports/basketball_nba/odds/?apiKey=${API_KEY}&regions=us&markets=h2h,spreads,totals&oddsFormat=american`);
    if(!r.ok)throw new Error('API '+r.status);
    const data=await r.json();
    setCache(data);
    const tn=new Set(['Detroit Pistons','Orlando Magic','Oklahoma City Thunder','Phoenix Suns','Minnesota Timberwolves','Denver Nuggets']);
    const f=data.filter(g=>tn.has(g.home_team)||tn.has(g.away_team));
    games=f.length?f.slice(0,3):fallback();
    loadedAt=new Date();
    document.getElementById('liveLabel').textContent='LIVE · '+loadedAt.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    toast('Lines updated');
  }catch(e){
    toast('API error — using cached data');
  }
  btn.textContent='REFRESH LINES';
  btn.style.opacity='1';
  btn.style.pointerEvents='auto';
  renderAll();
}

function renderLocked(){
  if(!locked.length){document.getElementById('lockedArea').innerHTML='';return}
  let h=`<div class="locked-area"><div class="locked-hdr">Locked slips</div>`;
  locked.forEach((ls,si)=>{
    const wins=ls.legs.filter(l=>l.result==='win').length,losses=ls.legs.filter(l=>l.result==='loss').length,pend=ls.legs.filter(l=>!l.result).length,done=!pend,allW=done&&wins===ls.legs.length;
    const pR=done?(allW?ls.prof:-ls.stake):null,sR=done?ls.legs.reduce((s,l)=>s+(l.result==='win'?l.sp-l.pl:-l.pl),0):null,diff=done?sR-pR:null;
    h+=`<div class="locked-card"><div class="lc-hdr"><div class="lc-name">${ls.legs.length}-Leg Parlay · $${ls.stake}</div><div class="lc-meta">LOCKED ${ls.at} · ${wins}W ${losses}L ${pend}P</div></div>`;
    ls.legs.forEach((l,li)=>{const dot=!l.result?'var(--fog)':l.result==='win'?'var(--lime)':'var(--red)';h+=`<div class="lc-leg"><div class="lc-dot" style="background:${dot}"></div><div class="lc-info"><div class="lc-pick">${l.label}</div><div class="lc-sub"><span>${fo(l.odds)}</span><span>${l.locked}</span></div></div><div class="lc-res"><button class="res-btn${l.result==='win'?' win':''}" onclick="setRes(${si},${li},'win')">WIN</button><button class="res-btn${l.result==='loss'?' loss':''}" onclick="setRes(${si},${li},'loss')">LOSS</button></div></div>`});
    if(done){const pc=pR>=0?'var(--lime)':'var(--red)',sc=sR>=0?'var(--lime)':'var(--red)',dc=diff>0?'var(--lime)':'var(--text)';h+=`<div class="cmp-grid"><div class="cmp-col"><div class="cmp-lbl">Parlay</div><div class="cmp-val" style="color:${pc}">${fm(pR)}</div><div class="cmp-sub">All or nothing</div></div><div class="cmp-div"></div><div class="cmp-col"><div class="cmp-lbl">Straight bets</div><div class="cmp-val" style="color:${sc}">${fm(sR)}</div><div class="cmp-sub">Same stake split</div></div></div><div class="delta" style="background:${diff>0?'rgba(182,245,66,.05)':'transparent'}"><div class="delta-lbl">Parlay format cost you</div><div class="delta-val" style="color:${dc}">${fm(diff)}</div></div>`}
    h+=`</div>`;
  });
  h+=`</div>`;
  document.getElementById('lockedArea').innerHTML=h;
}

load();
</script>
</body>
</html>
