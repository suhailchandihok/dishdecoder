<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leg Up — No money. Just your picks.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--ink:#0d0d12;--ink2:#16161f;--ink3:#1e1e2a;--ink4:#26263a;--line:rgba(255,255,255,0.07);--line2:rgba(255,255,255,0.12);--line3:rgba(255,255,255,0.18);--text:#f2f2f8;--text2:#9090b0;--text3:#55556a;--lime:#b6f542;--lime-dim:rgba(182,245,66,0.1);--lime-line:rgba(182,245,66,0.28);--red:#ff4d4d;--red-dim:rgba(255,77,77,0.1);--red-line:rgba(255,77,77,0.28);--amber:#ffb347;--amber-dim:rgba(255,179,71,0.1);--r:8px;--r2:12px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px}
body{background:var(--ink);color:var(--text);font-family:'IBM Plex Sans',sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased}

/* TOPBAR */
.topbar{height:54px;background:var(--ink2);border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 18px;position:sticky;top:0;z-index:200}
.logo{display:flex;align-items:center;gap:9px;margin-right:20px;flex-shrink:0}
.logo-mark{width:28px;height:28px;background:var(--lime);border-radius:6px;display:flex;align-items:center;justify-content:center}
.logo-mark svg{width:15px;height:15px}
.logo-text{font-family:'Syne',sans-serif;font-weight:800;font-size:16px;letter-spacing:-.3px}
.logo-sub{font-size:9px;color:var(--text3);letter-spacing:.04em;margin-top:1px}
.topbar-games{display:flex;gap:2px;flex:1;overflow-x:auto;scrollbar-width:none}
.topbar-games::-webkit-scrollbar{display:none}
.tg-btn{display:flex;flex-direction:column;align-items:center;padding:5px 14px;border-radius:var(--r);cursor:pointer;border:1px solid transparent;background:transparent;font-family:inherit;transition:all .15s;white-space:nowrap;gap:1px}
.tg-btn:hover{background:var(--ink3)}
.tg-btn.active{background:var(--lime-dim);border-color:var(--lime-line)}
.tg-teams{font-family:'Syne',sans-serif;font-weight:600;font-size:12px;color:var(--text)}
.tg-btn.active .tg-teams{color:var(--lime)}
.tg-info{font-size:9px;color:var(--text3);font-family:'IBM Plex Mono',monospace}
.tg-btn.active .tg-info{color:rgba(182,245,66,.5)}
.topbar-right{display:flex;align-items:center;gap:8px;margin-left:auto;flex-shrink:0;padding-left:12px}
.live-pill{display:flex;align-items:center;gap:5px;background:var(--lime-dim);border:1px solid var(--lime-line);border-radius:20px;padding:4px 10px;font-size:9px;color:var(--lime);font-family:'IBM Plex Mono',monospace;letter-spacing:.05em}
.live-pip{width:5px;height:5px;border-radius:50%;background:var(--lime);animation:blink 2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.top-btn{background:var(--ink3);border:1px solid var(--line2);border-radius:20px;padding:5px 12px;font-size:9px;color:var(--text2);cursor:pointer;font-family:'IBM Plex Mono',monospace;letter-spacing:.05em;transition:all .15s;display:none}
.top-btn:hover{border-color:var(--lime-line);color:var(--lime)}
.slip-pill{display:flex;align-items:center;gap:6px;background:var(--ink3);border:1px solid var(--line2);border-radius:20px;padding:5px 13px;font-size:11px;color:var(--text2);cursor:pointer;font-family:'IBM Plex Mono',monospace;transition:all .15s}
.slip-pill:hover{border-color:var(--line3);color:var(--text)}
.slip-pill.on{background:var(--lime-dim);border-color:var(--lime-line);color:var(--lime)}
.slip-badge{background:var(--lime);color:var(--ink);border-radius:10px;padding:1px 5px;font-size:9px;font-weight:700;display:none;min-width:16px;text-align:center}
.slip-pill.on .slip-badge{display:block}

/* NAV BARS */
.page-nav{background:var(--ink2);border-bottom:1px solid var(--line);padding:0 18px;display:flex;gap:0}
.pn-tab{padding:10px 15px;font-size:11px;font-weight:500;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;font-family:'IBM Plex Mono',monospace;letter-spacing:.05em;text-transform:uppercase;background:transparent;border-top:none;border-left:none;border-right:none;transition:all .15s}
.pn-tab:hover{color:var(--text2)}
.pn-tab.active{color:var(--lime);border-bottom-color:var(--lime)}
.cat-bar{background:var(--ink2);border-bottom:1px solid var(--line);padding:0 18px;display:flex;gap:0;overflow-x:auto;scrollbar-width:none}
.cat-bar::-webkit-scrollbar{display:none}
.cat-tab{padding:10px 13px;font-size:11px;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;font-family:'IBM Plex Sans',sans-serif;transition:all .15s;background:transparent;border-top:none;border-left:none;border-right:none;font-family:inherit}
.cat-tab:hover{color:var(--text2)}
.cat-tab.active{color:var(--lime);border-bottom-color:var(--lime);font-weight:500}

/* LAYOUT */
.body-wrap{display:grid;grid-template-columns:1fr 320px;min-height:calc(100vh - 114px)}
.main-col{padding:18px;overflow-y:auto}
.slip-col{border-left:1px solid var(--line);background:var(--ink2);display:flex;flex-direction:column;position:sticky;top:114px;max-height:calc(100vh - 114px);overflow-y:auto}
.page-col{padding:18px;max-width:860px;margin:0 auto;width:100%}

/* SEC LABEL */
.sec-lbl{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.12em;color:var(--text3);text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.sec-lbl::after{content:'';flex:1;height:1px;background:var(--line)}

/* GAME LINE CARD */
.gl-card{background:var(--ink2);border:1px solid var(--line2);border-radius:var(--r2);overflow:hidden;margin-bottom:14px}
.gl-hdr{padding:12px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line)}
.gl-title{font-family:'Syne',sans-serif;font-weight:700;font-size:14px;letter-spacing:-.2px}
.gl-src{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--text3);background:var(--ink3);padding:2px 7px;border-radius:4px}
.mkt-block{border-bottom:1px solid var(--line)}
.mkt-block:last-child{border-bottom:none}
.mkt-lbl{padding:8px 14px 0;font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:.09em;text-transform:uppercase}
.mkt-opts{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:7px 14px 12px}
.mkt-btn{background:var(--ink3);border:1px solid var(--line2);border-radius:var(--r);padding:10px;text-align:center;cursor:pointer;transition:all .16s;font-family:inherit}
.mkt-btn:hover{border-color:var(--line3)}
.mkt-btn.sel{background:var(--lime-dim);border-color:var(--lime-line)}
.mb-lbl{font-size:10px;color:var(--text3);margin-bottom:4px}
.mkt-btn.sel .mb-lbl{color:rgba(182,245,66,.55)}
.mb-main{font-family:'Syne',sans-serif;font-weight:700;font-size:17px;color:var(--text);letter-spacing:-.3px}
.mkt-btn.sel .mb-main{color:var(--lime)}
.mb-odds{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text2);margin-top:3px}
.mkt-btn.sel .mb-odds{color:rgba(182,245,66,.65)}

/* PLAYER PROPS */
.player-group{margin-bottom:8px}
.player-hdr{display:flex;align-items:center;gap:10px;padding:9px 13px;background:var(--ink3);border:1px solid var(--line2);border-radius:var(--r2) var(--r2) 0 0}
.p-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:500;flex-shrink:0}
.p-name{font-family:'Syne',sans-serif;font-weight:600;font-size:13px;display:flex;align-items:center;gap:6px}
.p-team{font-size:9px;color:var(--text3);font-family:'IBM Plex Mono',monospace;margin-top:1px}
.badge{font-size:8px;padding:1px 5px;border-radius:3px;font-weight:500;font-family:'IBM Plex Mono',monospace;letter-spacing:.03em}
.badge-hot{background:var(--amber-dim);color:var(--amber);border:1px solid rgba(255,179,71,.22)}
.badge-inj{background:var(--red-dim);color:var(--red);border:1px solid var(--red-line)}
.prop-list{background:var(--ink2);border:1px solid var(--line2);border-top:1px solid var(--line);border-radius:0 0 var(--r2) var(--r2);overflow:hidden}
.prop-row{display:grid;grid-template-columns:1fr 48px 112px;align-items:center;padding:8px 13px;border-bottom:1px solid var(--line);gap:8px;transition:background .1s}
.prop-row:last-child{border-bottom:none}
.prop-row:hover{background:rgba(255,255,255,.02)}
.pr-type{font-size:11px;color:var(--text2)}
.pr-line{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:500;color:var(--text);text-align:center}
.pr-btns{display:grid;grid-template-columns:1fr 1fr;gap:3px}
.ou-btn{padding:6px 0;border-radius:5px;border:1px solid var(--line2);background:var(--ink3);cursor:pointer;text-align:center;transition:all .14s;font-family:inherit}
.ou-btn:hover{border-color:var(--line3)}
.ou-dir{font-size:8px;color:var(--text3);display:block;text-transform:uppercase;letter-spacing:.05em;font-family:'IBM Plex Mono',monospace}
.ou-odds{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:500;color:var(--text);display:block;margin-top:1px}
.ou-btn.sel-o{background:var(--lime-dim);border-color:var(--lime-line)}
.ou-btn.sel-o .ou-dir{color:rgba(182,245,66,.5)}
.ou-btn.sel-o .ou-odds{color:var(--lime)}
.ou-btn.sel-u{background:var(--red-dim);border-color:var(--red-line)}
.ou-btn.sel-u .ou-dir{color:rgba(255,77,77,.5)}
.ou-btn.sel-u .ou-odds{color:var(--red)}

/* SLIP */
.slip-hdr{padding:14px 16px 10px;border-bottom:1px solid var(--line)}
.slip-title-row{display:flex;align-items:baseline;justify-content:space-between}
.slip-title{font-family:'Syne',sans-serif;font-weight:800;font-size:15px;letter-spacing:-.2px}
.slip-legs-ct{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text3)}
.slip-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 18px;text-align:center}
.se-mark{font-family:'Syne',sans-serif;font-size:38px;font-weight:800;color:var(--ink4);margin-bottom:8px;letter-spacing:-3px}
.se-txt{font-size:11px;color:var(--text3);line-height:1.7}
.slip-items{overflow-y:auto}
.slip-item{padding:10px 14px;border-bottom:1px solid var(--line);position:relative}
.si-pick{font-weight:500;font-size:12px;color:var(--text);padding-right:18px;line-height:1.4}
.si-game{font-size:9px;color:var(--text3);font-family:'IBM Plex Mono',monospace;margin-top:2px}
.si-row{display:flex;align-items:center;gap:7px;margin-top:5px;flex-wrap:wrap}
.si-odds{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:500}
.si-time{font-size:9px;color:var(--text3);font-family:'IBM Plex Mono',monospace}
.si-pts{font-size:9px;padding:1px 5px;border-radius:3px;background:var(--lime-dim);border:1px solid var(--lime-line);color:var(--lime);font-family:'IBM Plex Mono',monospace;font-weight:500}
.si-rm{position:absolute;top:10px;right:13px;background:transparent;border:none;color:var(--text3);cursor:pointer;font-size:15px;line-height:1;transition:color .1s}
.si-rm:hover{color:var(--red)}
.slip-foot{padding:12px 14px;border-top:1px solid var(--line)}
.foot-lbl{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:7px}
.stake-wrap{display:flex;align-items:center;background:var(--ink3);border:1px solid var(--line2);border-radius:var(--r);overflow:hidden;margin-bottom:7px;transition:border-color .15s}
.stake-wrap:focus-within{border-color:var(--lime-line)}
.stake-sign{padding:0 10px;font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--text3);border-right:1px solid var(--line)}
.stake-in{flex:1;background:transparent;border:none;padding:8px 9px;font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:500;color:var(--text);outline:none}
.presets{display:flex;gap:3px;margin-bottom:10px}
.pre{flex:1;padding:5px 0;border-radius:5px;border:1px solid var(--line);background:transparent;font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--text3);cursor:pointer;transition:all .12s;text-align:center}
.pre:hover{border-color:var(--line2);color:var(--text2)}
.pre.on{background:var(--lime-dim);border-color:var(--lime-line);color:var(--lime)}
.parlay-box{background:var(--ink3);border:1px solid var(--line);border-radius:var(--r);padding:9px 11px;margin-bottom:10px}
.pb-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.pb-row:last-child{margin-bottom:0;border-top:1px solid var(--line);padding-top:5px;margin-top:2px}
.pb-lbl{font-size:10px;color:var(--text3)}
.pb-val{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:500;color:var(--text)}
.pb-val.g{color:var(--lime)}
.lock-btn{width:100%;padding:11px;background:var(--lime);color:var(--ink);border:none;border-radius:var(--r);font-family:'Syne',sans-serif;font-weight:800;font-size:12px;letter-spacing:.04em;cursor:pointer;transition:opacity .14s;margin-bottom:5px}
.lock-btn:hover{opacity:.87}
.split-btn{width:100%;padding:8px;background:transparent;border:1px solid var(--line2);border-radius:var(--r);font-size:11px;color:var(--text3);cursor:pointer;font-family:inherit;transition:all .14s}
.split-btn:hover{border-color:var(--line3);color:var(--text2)}

/* STRAIGHT BET PREVIEW */
.split-panel{background:var(--ink);border-top:1px solid var(--line)}
.split-panel-hdr{padding:9px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line);background:var(--ink3)}
.sp-title{font-family:'Syne',sans-serif;font-weight:700;font-size:11px;color:var(--text)}
.sp-close{background:transparent;border:none;color:var(--text3);cursor:pointer;font-size:16px;line-height:1}
.sp-close:hover{color:var(--red)}
.llb-hdr{padding:6px 11px;display:grid;grid-template-columns:1fr 52px 58px 64px;gap:6px;border-bottom:1px solid var(--line);background:var(--ink3)}
.llb-col{font-family:'IBM Plex Mono',monospace;font-size:8px;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);text-align:right}
.llb-col:first-child{text-align:left}
.llb-row{padding:7px 11px;display:grid;grid-template-columns:1fr 52px 58px 64px;gap:6px;border-bottom:1px solid var(--line);align-items:center}
.llb-row:last-child{border-bottom:none}
.llb-pick{font-size:11px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:5px}
.llb-odds{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text2);text-align:right}
.llb-stake{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text2);text-align:right}
.llb-ret{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:500;text-align:right}
.split-totals{display:grid;grid-template-columns:1fr 1px 1fr;border-top:2px solid var(--line2)}
.st-col{padding:11px 14px;text-align:center}
.st-div{background:var(--line2)}
.st-lbl{font-family:'IBM Plex Mono',monospace;font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:4px}
.st-val{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;letter-spacing:-.4px}
.st-sub{font-size:9px;color:var(--text3);margin-top:2px}
.split-delta{padding:10px 14px;text-align:center;border-top:1px solid var(--line)}
.sd-lbl{font-family:'IBM Plex Mono',monospace;font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:3px}
.sd-val{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;letter-spacing:-.4px}
.sd-msg{font-size:10px;color:var(--text3);margin-top:4px;line-height:1.6;padding:0 6px}

/* LOCKED SLIPS */
.locked-area{padding:18px}
.locked-hdr{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.locked-hdr::after{content:'';flex:1;height:1px;background:var(--line)}
.locked-card{background:var(--ink2);border:1px solid var(--line2);border-radius:var(--r2);overflow:hidden;margin-bottom:10px}
.lc-hdr{padding:10px 13px;background:var(--ink3);border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
.lc-name{font-family:'Syne',sans-serif;font-weight:600;font-size:12px}
.lc-meta{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--text3)}
.lc-leg{display:flex;align-items:center;gap:9px;padding:8px 13px;border-bottom:1px solid var(--line)}
.lc-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.lc-info{flex:1;min-width:0}
.lc-pick{font-size:12px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lc-sub{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--text3);margin-top:2px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.lc-pts{font-size:9px;padding:1px 5px;border-radius:3px;font-family:'IBM Plex Mono',monospace;font-weight:500}
.lc-res{display:flex;gap:3px;flex-shrink:0}
.res-btn{padding:3px 8px;border-radius:4px;border:1px solid var(--line);background:var(--ink3);font-size:9px;color:var(--text3);cursor:pointer;font-family:'IBM Plex Mono',monospace;transition:all .12s}
.res-btn:hover{border-color:var(--line2);color:var(--text)}
.res-btn.win{background:var(--lime-dim);border-color:var(--lime-line);color:var(--lime)}
.res-btn.loss{background:var(--red-dim);border-color:var(--red-line);color:var(--red)}
.ll-breakdown{margin:0 12px 12px;background:var(--ink3);border:1px solid var(--line);border-radius:var(--r);overflow:hidden}
.cmp-grid{display:grid;grid-template-columns:1fr 1px 1fr;border-top:1px solid var(--line)}
.cmp-col{padding:12px;text-align:center}
.cmp-div{background:var(--line)}
.cmp-lbl{font-family:'IBM Plex Mono',monospace;font-size:8px;letter-spacing:.09em;text-transform:uppercase;color:var(--text3);margin-bottom:4px}
.cmp-val{font-family:'Syne',sans-serif;font-weight:800;font-size:19px;letter-spacing:-.4px}
.cmp-sub{font-size:9px;color:var(--text3);margin-top:2px}
.delta{padding:11px 13px;text-align:center;border-top:1px solid var(--line)}
.delta-lbl{font-family:'IBM Plex Mono',monospace;font-size:8px;letter-spacing:.09em;text-transform:uppercase;color:var(--text3);margin-bottom:3px}
.delta-val{font-family:'Syne',sans-serif;font-weight:800;font-size:20px;letter-spacing:-.4px}
.delta-msg{font-size:10px;color:var(--text3);margin-top:5px;line-height:1.6;padding:0 8px}

/* STATS / PROFILE */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.stat-card{background:var(--ink2);border:1px solid var(--line2);border-radius:var(--r2);padding:14px;text-align:center}
.sc-val{font-family:'Syne',sans-serif;font-weight:800;font-size:22px;letter-spacing:-.5px;margin-bottom:3px}
.sc-lbl{font-family:'IBM Plex Mono',monospace;font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3)}
.sc-sub{font-size:9px;color:var(--text3);margin-top:3px}

/* HISTORY */
.history-card{background:var(--ink2);border:1px solid var(--line2);border-radius:var(--r2);overflow:hidden;margin-bottom:12px}
.hc-hdr{padding:10px 14px;background:var(--ink3);border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
.hc-title{font-family:'Syne',sans-serif;font-weight:700;font-size:12px}
.hc-sub{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--text3)}
.hist-row{display:grid;grid-template-columns:1fr 64px 56px 64px;gap:8px;padding:9px 14px;border-bottom:1px solid var(--line);align-items:center}
.hist-row:last-child{border-bottom:none}
.hist-row:hover{background:rgba(255,255,255,.02)}
.hr-pick{font-size:11px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hr-type{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--text3);margin-top:1px}
.hr-val{font-family:'IBM Plex Mono',monospace;font-size:10px;text-align:right}
.hr-result{text-align:right}

// ── SCORING ENGINE ────────────────────────
const SCORE_TIERS=[
  {label:'Lock',min:-Infinity,max:-300,pts:5},
  {label:'Heavy Fav',min:-299,max:-150,pts:8},
  {label:'Favorite',min:-149,max:-110,pts:12},
  {label:'Pick\'em',min:-109,max:100,pts:18},

  {label:'Big Dog',min:201,max:350,pts:45},
  {label:'Huge Dog',min:351,max:Infinity,pts:70}
];
const PARLAY_MULT={1:1,2:1.5,3:2,4:2.75,5:3.5};
const parlayMult=n=>n>=6?4.5:(PARLAY_MULT[n]||1);

function getTier(odds){
  return SCORE_TIERS.find(t=>odds>=t.min&&odds<=t.max)||SCORE_TIERS[0];
}
function calcPoints(odds,legs,allHit){
  if(legs<=1)return getTier(odds).pts;
  return allHit?Math.round(getTier(odds).pts*parlayMult(legs)):getTier(odds).pts;
}

  const totMap={};
  (totals||[]).forEach(p=>{
    if(!totMap[p.session_id])totMap[p.session_id]={total:0,wins:0};
    totMap[p.session_id].total++;
    if(p.result==='win')totMap[p.session_id].wins++;
  });
  // get usernames
  const sids=Object.keys(map);
  if(!sids.length)return[];
  const sessions=await sbFetch(`sessions?id=in.(${sids.join(',')})&select=id,username`);
  const nameMap={};
  (sessions||[]).forEach(s=>nameMap[s.id]=s.username);
  return Object.values(map).map(m=>({
    ...m,
    username:nameMap[m.sid]||'Anonymous',
    total:totMap[m.sid]?.total||0,
    acc:totMap[m.sid]?.total?Math.round(totMap[m.sid].wins/totMap[m.sid].total*100):0,
    isMe:m.sid===sessionId
  })).sort((a,b)=>b.pts-a.pts);
}

// ── SLIP ──────────────────────────────────
function addPick(key,label,odds,game){
  const base=key.split('_').slice(0,-1).join('_');
  slip=slip.filter(s=>!s.key.startsWith(base+'_'));
  if(!inSlip(key)){slip.push({key,label,odds,game,locked:new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}),result:null});toast('Added')}
  syncPill();renderSlip();
}
function removePick(key){slip=slip.filter(s=>s.key!==key);syncPill();renderSlip()}
function syncPill(){
  const b=document.getElementById('slipBadge'),p=document.getElementById('slipPill');
  b.textContent=slip.length;
  slip.length?p.classList.add('on'):p.classList.remove('on');
  b.style.display=slip.length?'block':'none';
}
function focusSlip(){document.getElementById('slipCol').scrollIntoView({behavior:'smooth'})}

async function lockSlip(){
  if(!slip.length){toast('Add picks first');return}
  const{pay,prof}=calcP();
  const pl=+(stake/slip.length).toFixed(2);
  const isParlay=slip.length>1;
  const ls={
    legs:slip.map(s=>({...s,pl,sp:+(pl*dec(s.odds)).toFixed(2),dbId:null})),
    stake,pay,prof,isParlay,
    at:new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})
  };
  locked.unshift(ls);
  slip=[];showSplitView=false;syncPill();
  saveLockedLocal();
  // Save to Supabase (pending, no result yet)
  for(const leg of ls.legs){
    const row=await savePick(leg,null,isParlay,ls.legs.length,false);
    if(row&&row[0])leg.dbId=row[0].id;
  }
  toast(`${ls.legs.length}-leg slip locked`);
  renderSlip();renderLocked();
}

async function setRes(si,li,r){
  const ls=locked[si];
  const leg=ls.legs[li];
  leg.result=r;
  saveLockedLocal();
  // Check if all results are marked to apply parlay multiplier
  const allDone=ls.legs.every(l=>l.result);
  const allHit=allDone&&ls.legs.every(l=>l.result==='win');
  // Update this leg in Supabase with correct points
  if(leg.dbId){
    const pts=r==='win'?calcPoints(leg.odds,ls.isParlay?ls.legs.length:1,allHit):0;
    await updatePickResult(leg.dbId,r,pts);
    // If parlay just completed, update all other legs too with correct multiplier
    if(allDone&&ls.isParlay){
      for(const l of ls.legs){
        if(l.dbId&&l!==leg){
          const p=l.result==='win'?calcPoints(l.odds,ls.legs.length,allHit):0;
          await updatePickResult(l.dbId,l.result,p);
        }
      }
    }
  }
  renderLocked();
}

    <div class="parlay-box">

      <div class="pb-row"><span class="pb-lbl">${slip.length>1?`${slip.length}-Leg Parlay payout`:'Straight bet payout'}</span><span class="pb-val g">$${pay.toFixed(2)}</span></div>
      ${slip.length>1?`<div class="pb-row"><span class="pb-lbl">Parlay mult</span><span class="pb-val" style="color:var(--amber)">${parlayMult(slip.length)}x if all hit</span></div>`:''}
      <div class="pb-row"><span class="pb-lbl">Points if correct</span><span class="pb-val g">+${potentialPts} pts</span></div>
    </div>
    <button class="lock-btn" onclick="lockSlip()">LOCK PICKS — NO MONEY</button>

  </div>`;

  if(showSplitView){
    const straightTotal=slip.reduce((sum,s)=>+(sum+(perLeg*dec(s.odds))-perLeg).toFixed(2),0);

// ── LOCKED SLIPS ──────────────────────────
function renderLocked(){
  if(!locked.length){document.getElementById('lockedArea').innerHTML='';return}
  let h=`<div class="locked-area"><div class="locked-hdr">Locked slips · mark results after each game</div>`;

  locked.forEach((ls,si)=>{
    const wins=ls.legs.filter(l=>l.result==='win').length;
    const losses=ls.legs.filter(l=>l.result==='loss').length;
    const pend=ls.legs.filter(l=>!l.result).length;
    const done=!pend;
    const allHit=done&&wins===ls.legs.length;
    const parlayResult=done?(allHit?ls.prof:-ls.stake):null;
    const straightResult=done?+ls.legs.reduce((s,l)=>s+(l.result==='win'?l.pl*dec(l.odds)-l.pl:-l.pl),0).toFixed(2):null;
    const diff=done?+(straightResult-parlayResult).toFixed(2):null;
    const totalPts=done?ls.legs.reduce((s,l)=>s+(l.result==='win'?calcPoints(l.odds,ls.isParlay?ls.legs.length:1,allHit):0),0):null;

    h+=`<div class="locked-card"><div class="lc-hdr">
      <div class="lc-name">${ls.legs.length>1?ls.legs.length+'-Leg Parlay':'Straight Pick'} · $${ls.stake}</div>
      <div class="lc-meta">${ls.at} · ${wins}W ${losses}L ${pend}P${totalPts?` · +${totalPts}pts`:''}</div>
    </div>`;

    ls.legs.forEach((l,li)=>{
      const dot=!l.result?'var(--fog)':l.result==='win'?'var(--lime)':'var(--red)';
      const tier=getTier(l.odds);
      const legPts=l.result==='win'?calcPoints(l.odds,ls.isParlay?ls.legs.length:1,allHit):0;
      const straightProfit=l.result==='win'?+(l.pl*dec(l.odds)-l.pl).toFixed(2):null;
      h+=`<div class="lc-leg">
        <div class="lc-dot" style="background:${dot}"></div>
        <div class="lc-info">
          <div class="lc-pick">${l.label}</div>
          <div class="lc-sub">
            <span>${fo(l.odds)}</span>
            <span style="color:var(--text3)">${tier.label}</span>
            ${l.result==='win'?`<span style="color:var(--lime)">+${legPts}pts</span><span style="color:var(--lime)">+$${straightProfit?.toFixed(2)} straight</span>`:''}
            ${l.result==='loss'?`<span style="color:var(--red)">0pts · -$${l.pl.toFixed(2)} straight</span>`:''}
          </div>
        </div>
        <div class="lc-res">
          <button class="res-btn${l.result==='win'?' win':''}" onclick="setRes(${si},${li},'win')">WIN</button>
          <button class="res-btn${l.result==='loss'?' loss':''}" onclick="setRes(${si},${li},'loss')">LOSS</button>
        </div>
      </div>`;
    });

    // Leg breakdown table once any result marked
    if(wins+losses>0){
      h+=`<div class="ll-breakdown">
        <div class="llb-hdr"><div class="llb-col">Pick</div><div class="llb-col">Odds</div><div class="llb-col">Straight</div><div class="llb-col">Points</div></div>`;
      ls.legs.forEach(l=>{
        const ret=l.result==='win'?+(l.pl*dec(l.odds)-l.pl).toFixed(2):l.result==='loss'?-l.pl:null;
        const pts=l.result==='win'?calcPoints(l.odds,ls.isParlay?ls.legs.length:1,allHit):l.result==='loss'?0:null;
        const rc=!l.result?'var(--text3)':l.result==='win'?'var(--lime)':'var(--red)';
        h+=`<div class="llb-row">
          <div class="llb-pick" style="display:flex;align-items:center;gap:5px"><span style="width:5px;height:5px;border-radius:50%;background:${!l.result?'var(--fog)':l.result==='win'?'var(--lime)':'var(--red)'};flex-shrink:0;display:inline-block"></span>${l.label}</div>
          <div class="llb-odds">${fo(l.odds)}</div>
          <div class="llb-stake" style="color:${rc}">${ret===null?'—':ret>=0?'+$'+ret.toFixed(2):'-$'+Math.abs(ret).toFixed(2)}</div>
          <div class="llb-ret" style="color:${rc}">${pts===null?'—':pts>0?'+'+pts:'0'}</div>
        </div>`;
      });
      h+=`</div>`;
    }

    // Full comparison when done
    if(done){
      const pc=parlayResult>=0?'var(--lime)':'var(--red)';
      const sc=straightResult>=0?'var(--lime)':'var(--red)';
      h+=`<div class="cmp-grid">
        <div class="cmp-col">
          <div class="cmp-lbl">What you got · Parlay</div>
          <div class="cmp-val" style="color:${pc}">${fm(parlayResult)}</div>
          <div class="cmp-sub">${allHit?'All legs hit':losses+' wrong leg'+(losses>1?'s':'')+' ended it'}</div>
        </div>
        <div class="cmp-div"></div>
        <div class="cmp-col">
          <div class="cmp-lbl">If straight bets</div>
          <div class="cmp-val" style="color:${sc}">${fm(straightResult)}</div>
          <div class="cmp-sub">${wins}/${ls.legs.length} correct · independent</div>
        </div>
      </div>
      <div class="delta" style="background:${diff>0?'rgba(255,77,77,.03)':'rgba(182,245,66,.03)'}">
        <div class="delta-lbl">Parlay format ${diff>0?'cost':'saved'} you</div>
        <div class="delta-val" style="color:${diff>0?'var(--red)':'var(--lime)'}">${diff>0?'-':'+'} $${Math.abs(diff).toFixed(2)}</div>
        <div class="delta-msg">${!allHit&&wins>0
          ?`You went ${wins}/${ls.legs.length}. As straight bets those ${wins} correct picks would have returned <strong style="color:var(--text)">+$${ls.legs.filter(l=>l.result==='win').reduce((s,l)=>+(s+l.pl*dec(l.odds)-l.pl).toFixed(2),0).toFixed(2)}</strong>. The parlay format turned a winning night into a full loss.`
          :allHit
          ?`Perfect card — all ${ls.legs.length} legs hit. The parlay ${diff<0?`paid $${Math.abs(diff).toFixed(2)} more than straight bets would have`:`actually paid less than straight bets — unusual odds combination`}.`
          :`All ${ls.legs.length} legs missed. Straight bets also lose, but only $${Math.abs(straightResult).toFixed(2)} vs parlay loss of $${ls.stake.toFixed(2)}.`
        }</div>
        ${totalPts?`<div style="margin-top:8px;font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--lime)">+${totalPts} points earned this slip</div>`:''}
      </div>`;
    }

    h+=`</div>`;
  });

  h+=`</div>`;
  document.getElementById('lockedArea').innerHTML=h;
}

// ── RECORD PAGE ───────────────────────────
async function renderRecord(){
  document.getElementById('recordCol').innerHTML=`<div class="loading-wrap"><div class="spinner"></div><div class="loading-txt">Loading your record...</div></div>`;
  await loadMyPicks();
  const picks=dbPicks;
  const resolved=picks.filter(p=>p.result!=='pending');
  const wins=resolved.filter(p=>p.result==='win');
  const losses=resolved.filter(p=>p.result==='loss');
  const totalPts=wins.reduce((s,p)=>s+(p.points||0),0);
  const acc=resolved.length?Math.round(wins.length/resolved.length*100):0;
  // ROI on $10 per pick
  const roi=resolved.reduce((s,p)=>{
    if(p.result==='win')return s+(10*dec(p.odds)-10);
    return s-10;
  },0);
  // By odds tier
  const byTier={};
  SCORE_TIERS.forEach(t=>byTier[t.label]={w:0,l:0,pts:0});
  resolved.forEach(p=>{const t=p.odds_label||getTier(p.odds).label;if(!byTier[t])byTier[t]={w:0,l:0,pts:0};if(p.result==='win'){byTier[t].w++;byTier[t].pts+=p.points||0}else byTier[t].l++});

  let h=`<div class="sec-lbl">Your record · ${username}</div>`;
  h+=`<div class="stats-grid">
    <div class="stat-card"><div class="sc-val" style="color:var(--lime)">${totalPts}</div><div class="sc-lbl">Total points</div></div>
    <div class="stat-card"><div class="sc-val">${acc}%</div><div class="sc-lbl">Accuracy</div><div class="sc-sub">${wins.length}W · ${losses.length}L</div></div>
    <div class="stat-card"><div class="sc-val" style="color:${roi>=0?'var(--lime)':'var(--red)'}">${roi>=0?'+':'-'}$${Math.abs(roi).toFixed(0)}</div><div class="sc-lbl">ROI at $10/pick</div></div>
    <div class="stat-card"><div class="sc-val">${resolved.length}</div><div class="sc-lbl">Picks graded</div><div class="sc-sub">${picks.filter(p=>p.result==='pending').length} pending</div></div>
  </div>`;

  // Accuracy by tier
  h+=`<div class="breakdown-card"><div class="bk-hdr"><div class="bk-title">Accuracy by bet type</div></div>`;
  SCORE_TIERS.slice().reverse().forEach(t=>{
    const d=byTier[t.label]||{w:0,l:0,pts:0};
    const total=d.w+d.l;if(!total)return;
    const pct=Math.round(d.w/total*100);
    const col=pct>=60?'var(--lime)':pct>=45?'var(--amber)':'var(--red)';
    h+=`<div class="bk-row"><div class="bk-label">${t.label} (${fo(t.min)} to ${t.max===Infinity?'+∞':fo(t.max)})</div><div class="bk-track"><div class="bk-fill" style="width:${pct}%;background:${col}"></div></div><div class="bk-pct" style="color:${col}">${pct}%</div><div class="bk-pts">+${d.pts}pts</div></div>`;
  });
  h+=`</div>`;

  // Recent picks history
  if(picks.length){
    h+=`<div class="history-card"><div class="hc-hdr"><div class="hc-title">Pick history</div><div class="hc-sub">${picks.length} total</div></div>
      <div class="hist-row"><div class="col-hdr">Pick</div><div class="col-hdr">Odds</div><div class="col-hdr">Result</div><div class="col-hdr">Points</div></div>`;
    picks.slice(0,30).forEach(p=>{
      const rc=p.result==='win'?'var(--lime)':p.result==='loss'?'var(--red)':'var(--text3)';
      h+=`<div class="hist-row">
        <div><div class="hr-pick">${p.label}</div><div class="hr-type">${p.odds_label||''}${p.is_parlay?' · '+p.parlay_legs+'-leg parlay':''}</div></div>
        <div class="hr-val">${fo(p.odds)}</div>
        <div class="hr-result"><span style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:${rc}">${p.result.toUpperCase()}</span></div>
        <div class="hr-pts" style="color:${p.result==='win'?'var(--lime)':'var(--text3)'}">${p.result==='win'?'+'+p.points:'—'}</div>
      </div>`;
    });
    h+=`</div>`;
  }

  if(!picks.length)h+=`<div style="padding:40px;text-align:center;color:var(--text3);font-size:12px">No picks yet. Lock your first slip on the Board tab.</div>`;
  document.getElementById('recordCol').innerHTML=h;
  // Animate bars
  setTimeout(()=>document.querySelectorAll('.bk-fill').forEach(el=>{const w=el.style.width;el.style.width='0';setTimeout(()=>el.style.width=w,50)}),100);
}

// ── LEADERBOARD PAGE ──────────────────────
async function renderLeaderboard(){
  document.getElementById('leaderboardCol').innerHTML=`<div class="loading-wrap"><div class="spinner"></div><div class="loading-txt">Loading leaderboard...</div></div>`;
  const rows=await loadLeaderboard();
  let h=`<div class="sec-lbl">Global leaderboard · all time</div>`;

  if(!rows.length){
    h+=`<div style="padding:40px;text-align:center;color:var(--text3);font-size:12px">No picks graded yet. Be the first on the board.</div>`;
    document.getElementById('leaderboardCol').innerHTML=h;return;
  }

  h+=`<div class="lb-card">`;
  rows.slice(0,20).forEach((r,i)=>{
    const rank=i+1;
    const rankClass=rank===1?'gold':rank===2?'silver':rank===3?'bronze':'';
    const rankDisplay=rank===1?'#1':rank===2?'#2':rank===3?'#3':rank;
    const initials=r.username.slice(0,2).toUpperCase();
    const hue=((r.username.charCodeAt(0)||65)*47)%360;
    h+=`<div class="lb-row${r.isMe?' me':''}">
      <div class="lb-rank ${rankClass}">${rankDisplay}</div>
      <div class="lb-av" style="background:hsl(${hue},40%,20%);color:hsl(${hue},70%,65%)">${initials}</div>
      <div class="lb-info">
        <div class="lb-name">${r.username}${r.isMe?' <span style="font-size:9px;color:var(--lime);font-family:\'IBM Plex Mono\',monospace">(you)</span>':''}</div>
        <div class="lb-sub">${r.total} picks · ${r.acc}% accuracy</div>
      </div>
      <div>
        <div class="lb-pts">${r.pts} pts</div>
        <div class="lb-acc">${r.wins} correct</div>
      </div>
    </div>`;
  });
  h+=`</div>`;

  // My position if not in top 20
  const myPos=rows.findIndex(r=>r.isMe);
  if(myPos>=20){
    const me=rows[myPos];
    h+=`<div style="background:var(--lime-dim);border:1px solid var(--lime-line);border-radius:var(--r2);padding:12px 14px;display:flex;align-items:center;justify-content:space-between">
      <div style="font-size:12px;color:var(--text)">Your rank: <strong style="font-family:'Syne',sans-serif;font-weight:800">#${myPos+1}</strong></div>
      <div style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--lime)">${me.pts} pts · ${me.acc}% acc</div>
    </div>`;
  }

  document.getElementById('leaderboardCol').innerHTML=h;
}

// ── SCORING PAGE ──────────────────────────
function renderScoring(){
  let h=`<div class="sec-lbl">How points work</div>`;

  h+=`<div class="sg-card"><div class="sg-hdr"><div class="sg-title">Base points by odds</div><div class="sg-sub">Harder picks = more points. Every correct pick earns base points regardless of parlay.</div></div>`;
  SCORE_TIERS.forEach(t=>{
    const rangeStr=t.min===-Infinity?`${fo(t.max)} or worse`:t.max===Infinity?`${fo(t.min)} or better`:`${fo(t.min)} to ${fo(t.max)}`;
    h+=`<div class="sg-row"><div class="sg-left"><div class="sg-label">${t.label}</div><div class="sg-range">${rangeStr}</div></div><div class="sg-pts">+${t.pts} pts</div></div>`;
  });
  h+=`</div>`;

  h+=`<div class="sg-card"><div class="sg-hdr"><div class="sg-title">Full parlay bonus</div><div class="sg-sub">When EVERY leg of a parlay hits, all legs get a multiplier applied to their base points. Miss one leg and no multiplier — but you still keep your base points for legs you got right.</div></div>`;
  [[2,1.5],[3,2],[4,2.75],[5,3.5],[6,4.5]].forEach(([n,m])=>{
    h+=`<div class="sg-row"><div class="sg-left"><div class="sg-label">${n}-leg parlay — all hit</div><div class="sg-range">Every leg must be correct</div></div><div class="sg-mult">${m}x multiplier</div></div>`;
  });
  h+=`</div>`;

  h+=`<div class="sg-card"><div class="sg-hdr"><div class="sg-title">Example</div><div class="sg-sub">See exactly how points calculate in a real scenario.</div></div>
    <div class="sg-row"><div class="sg-left"><div class="sg-label">SGA Over 32.5 pts · -115 (Favorite)</div><div class="sg-range">Single straight pick</div></div><div class="sg-pts">+12 pts</div></div>
    <div class="sg-row"><div class="sg-left"><div class="sg-label">PHX ML · +305 (Big Dog) — in 3-leg parlay, all hit</div><div class="sg-range">45 base × 2.0x parlay mult</div></div><div class="sg-pts">+90 pts</div></div>
    <div class="sg-row"><div class="sg-left"><div class="sg-label">PHX ML · +305 — in 3-leg parlay, 1 leg misses</div><div class="sg-range">45 base only, no multiplier</div></div><div class="sg-pts">+45 pts</div></div>
    <div class="sg-row"><div class="sg-left"><div class="sg-label">Wrong pick, any odds</div><div class="sg-range">No points, no penalty</div></div><div class="sg-pts" style="color:var(--text3)">0 pts</div></div>
  </div>`;

  h+=`<div style="background:var(--ink2);border:1px solid var(--line2);border-radius:var(--r2);padding:14px;font-size:11px;color:var(--text3);line-height:1.8">
    The leaderboard ranks by total points. Accuracy is shown but not the primary rank metric — someone who correctly calls +300 underdogs at 50% accuracy will outscore someone who hammers -300 favorites at 90% accuracy. Real knowledge gets rewarded.
  </div>`;

  document.getElementById('scoringCol').innerHTML=h;
}

init();
</script>
